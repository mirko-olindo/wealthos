<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WealthOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f5;color:#1a1a18;font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#fff;border-right:0.5px solid rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px 16px 14px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.brand{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.sub{font-size:11px;color:#9e9d99;margin-top:2px}
.nav-section{padding:12px 8px 4px}
.nav-label{font-size:10px;font-weight:500;color:#9e9d99;padding:0 8px 4px;letter-spacing:0.07em;text-transform:uppercase;display:block}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#6b6a66;user-select:none}
.nav-item:hover{background:#f1f0ed}
.nav-item.active{background:#f1f0ed;color:#1a1a18;font-weight:500}
.main{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.topbar-title{font-size:14px;font-weight:500}
.content{padding:20px 24px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#f1f0ed;border-radius:8px;padding:14px 16px}
.kpi-label{font-size:10px;color:#6b6a66;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.kpi-value{font-size:22px;font-weight:600;line-height:1;letter-spacing:-0.03em}
.kpi-sub{font-size:11px;margin-top:5px;color:#9e9d99}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px 20px}
.card-title{font-size:10px;font-weight:500;color:#6b6a66;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px}
.charts-row{display:grid;grid-template-columns:1.3fr 0.7fr;gap:16px;margin-bottom:16px}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{color:#9e9d99;font-weight:400;text-align:left;padding:0 8px 10px 0;font-size:10px;text-transform:uppercase;letter-spacing:0.05em}
.data-table td{padding:7px 8px 7px 0;border-top:0.5px solid rgba(0,0,0,0.08);color:#1a1a18}
.pos{color:#1D9E75}.neg{color:#D85A30}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.cf-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cf-year{width:34px;font-size:11px;color:#6b6a66;text-align:right}
.cf-track{flex:1;height:14px;background:#f1f0ed;border-radius:3px;overflow:hidden;display:flex}
.cf-in{height:100%;background:#1D9E75}.cf-out{height:100%;background:#D85A30;opacity:0.7}
.cf-val{font-size:10px;color:#6b6a66;min-width:56px;text-align:right}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b6a66}
.legend-dot{width:8px;height:8px;border-radius:2px}
.empty{text-align:center;padding:40px 20px;color:#9e9d99;font-size:13px}
.upload-zone{border:1.5px dashed rgba(0,0,0,0.14);border-radius:12px;padding:24px;text-align:center;cursor:pointer}
.upload-zone:hover{background:#f1f0ed}
.btn{padding:6px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.14);background:#f1f0ed;color:#1a1a18;font-size:12px;cursor:pointer}
.btn-primary{background:#1a1a18;color:#fff;border-color:transparent}
.form-row{margin-bottom:12px}
.form-label{display:block;font-size:11px;color:#6b6a66;margin-bottom:4px}
.form-input,.form-select{width:100%;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.14);border-radius:8px;font-size:13px;background:#fff;color:#1a1a18}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:18px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;background:#f1f0ed;color:#6b6a66;border:0.5px solid rgba(0,0,0,0.08);margin:2px}
.sbadge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo"><div class="brand">WealthOS</div><div class="sub">Portfolio Intelligence</div></div>
    <div class="nav-section">
      <span class="nav-label">Overview</span>
      <div class="nav-item active" onclick="nav('dashboard',this)">Dashboard</div>
      <div class="nav-item" onclick="nav('cashflow',this)">Cash Flow</div>
    </div>
    <div class="nav-section">
      <span class="nav-label">Portafoglio</span>
      <div class="nav-item" onclick="nav('vehicles',this)">Veicoli</div>
    </div>
    <div class="nav-section">
      <span class="nav-label">Repository</span>
      <div class="nav-item" onclick="nav('documents',this)">Documenti</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><div class="topbar-title" id="tb"></div></div>
    <div class="content" id="ct"></div>
  </div>
</div>
<script>
var charts=[];
var titles={dashboard:'Dashboard portafoglio',cashflow:'Cash Flow',vehicles:'Veicoli',documents:'Documenti'};
var colors=['#378ADD','#1D9E75','#BA7517','#7F77DD','#888780','#D85A30'];

function fmt(v,t){
  if(v==null)return'—';
  if(t==='m')return v.toFixed(2)+'x';
  return'€ '+Number(v).toLocaleString('it-IT',{maximumFractionDigits:0});
}

async function get(p){try{var r=await fetch('/api'+p);return await r.json();}catch(e){return null;}}

function killCharts(){charts.forEach(function(c){try{c.destroy();}catch(e){}});charts=[];}

function nav(view,el){
  killCharts();
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('tb').textContent=titles[view]||view;
  document.getElementById('ct').innerHTML='<div class="empty">Caricamento...</div>';
  if(view==='dashboard')dash();
  else if(view==='cashflow')cf();
  else if(view==='vehicles')veh();
  else if(view==='documents')docs();
}

async function dash(){
  var kpi=await get('/dashboard/kpi');
  var alloc=await get('/dashboard/allocation');
  var cfdata=await get('/dashboard/cashflow');
  var navh=await get('/dashboard/nav-history');
  var vs=await get('/dashboard/vehicles-summary');
  var ct=document.getElementById('ct');
  ct.innerHTML='<div class="kpi-grid">'
    +'<div class="kpi-card"><div class="kpi-label">NAV Totale</div><div class="kpi-value">'+fmt(kpi&&kpi.total_nav)+'</div><div class="kpi-sub">'+(kpi&&kpi.total_vehicles||0)+' veicoli</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">Capitale Investito</div><div class="kpi-value">'+fmt(kpi&&kpi.total_invested)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">Distribuzioni</div><div class="kpi-value">'+fmt(kpi&&kpi.total_distributions)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">TVPI Medio</div><div class="kpi-value">'+(kpi&&kpi.avg_tvpi?kpi.avg_tvpi.toFixed(2)+'x':'—')+'</div></div>'
    +'</div>'
    +'<div class="charts-row">'
    +'<div class="card"><div class="card-title">Storico NAV</div><div style="position:relative;height:200px"><canvas id="nc"></canvas></div></div>'
    +'<div class="card"><div class="card-title">Allocazione</div>'
    +'<div class="legend-row" id="aleg"></div>'
    +'<div style="position:relative;height:140px"><canvas id="ac"></canvas></div></div>'
    +'</div>'
    +'<div class="bottom-row">'
    +'<div class="card"><div class="card-title">Cash flow</div><div id="cfb"></div>'
    +'<div class="legend-row" style="margin-top:8px"><div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Distribuzioni</div><div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Capital call</div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Performance veicoli</div>'
    +'<table class="data-table"><thead><tr><th>Veicolo</th><th>NAV</th><th>TVPI</th><th>IRR</th></tr></thead><tbody id="vtb"></tbody></table>'
    +'</div></div>';

  if(navh&&navh.length){
    var bd={};navh.forEach(function(p){bd[p.date]=(bd[p.date]||0)+p.nav;});
    var lbs=Object.keys(bd).sort();
    var ch=new Chart(document.getElementById('nc'),{type:'line',data:{labels:lbs.map(function(d){return d.substring(0,7);}),datasets:[{data:lbs.map(function(d){return bd[d];}),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',fill:true,tension:0.4,pointRadius:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9e9d99',font:{size:10},maxTicksLimit:8},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{color:'#9e9d99',font:{size:10},callback:function(v){return'€'+(v/1e6).toFixed(1)+'M';}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
    charts.push(ch);
  }
  if(alloc&&alloc.length){
    var leg=document.getElementById('aleg');
    leg.innerHTML=alloc.map(function(a,i){return'<div class="legend-item"><div class="legend-dot" style="background:'+colors[i%colors.length]+'"></div>'+a.asset_class+' '+a.percentage+'%</div>';}).join('');
    var ac=new Chart(document.getElementById('ac'),{type:'doughnut',data:{labels:alloc.map(function(d){return d.asset_class;}),datasets:[{data:alloc.map(function(d){return d.nav_value;}),backgroundColor:colors,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}});
    charts.push(ac);
  }
  if(cfdata&&cfdata.length){
    var mx=Math.max.apply(null,cfdata.map(function(r){return r.inflows+r.outflows;}));if(!mx)mx=1;
    document.getElementById('cfb').innerHTML=cfdata.map(function(r){return'<div class="cf-row"><div class="cf-year">'+r.year+'</div><div class="cf-track"><div class="cf-in" style="width:'+(r.inflows/mx*100)+'%"></div><div class="cf-out" style="width:'+(r.outflows/mx*100)+'%"></div></div><div class="cf-val" style="color:'+(r.net>=0?'#1D9E75':'#D85A30')+'">'+(r.net>=0?'+':'')+fmt(r.net)+'</div></div>';}).join('');
  }
  if(vs&&vs.length){
    document.getElementById('vtb').innerHTML=vs.slice(0,6).map(function(v){return'<tr><td>'+v.name+'</td><td>'+fmt(v.latest_nav)+'</td><td class="'+(v.tvpi>=1?'pos':'neg')+'">'+(v.tvpi?v.tvpi.toFixed(2)+'x':'—')+'</td><td class="'+(v.irr>=0?'pos':'neg')+'">'+(v.irr!=null?v.irr.toFixed(1)+'%':'—')+'</td></tr>';}).join('');
  }
}

async function cf(){
  var cfdata=await get('/dashboard/cashflow');
  var vs=await get('/dashboard/vehicles-summary');
  var ct=document.getElementById('ct');
  var dists=[],ccs=[];
  if(vs)for(var i=0;i<vs.length;i++){
    var d=await get('/vehicles/'+vs[i].id+'/distributions');
    var c=await get('/vehicles/'+vs[i].id+'/capital-calls');
    if(d)d.forEach(function(x){dists.push({name:vs[i].name,date:x.payment_date,amount:x.amount,type:x.distribution_type});});
    if(c)c.forEach(function(x){ccs.push({name:vs[i].name,date:x.call_date,amount:x.amount,due:x.due_date});});
  }
  ct.innerHTML='<div class="bottom-row" style="margin-bottom:16px">'
    +(cfdata||[]).map(function(r){return'<div class="kpi-card" style="display:flex;justify-content:space-between;align-items:center"><div><div class="kpi-label">'+r.year+'</div><div class="kpi-value" style="font-size:16px;color:'+(r.net>=0?'#1D9E75':'#D85A30')+'">'+(r.net>=0?'+':'')+fmt(r.net)+'</div></div><div style="font-size:11px;color:#9e9d99;text-align:right"><div>↑ '+fmt(r.inflows)+'</div><div>↓ '+fmt(r.outflows)+'</div></div></div>';}).join('')
    +'</div><div class="bottom-row">'
    +'<div class="card"><div class="card-title">Distribuzioni</div>'
    +(dists.length?'<table class="data-table"><thead><tr><th>Data</th><th>Veicolo</th><th>Importo</th></tr></thead><tbody>'+dists.slice(0,15).map(function(d){return'<tr><td>'+d.date+'</td><td>'+d.name+'</td><td class="pos">'+fmt(d.amount)+'</td></tr>';}).join('')+'</tbody></table>':'<div class="empty">Nessuna distribuzione</div>')
    +'</div>'
    +'<div class="card"><div class="card-title">Capital call</div>'
    +(ccs.length?'<table class="data-table"><thead><tr><th>Data</th><th>Veicolo</th><th>Importo</th></tr></thead><tbody>'+ccs.slice(0,15).map(function(c){return'<tr><td>'+c.date+'</td><td>'+c.name+'</td><td class="neg">'+fmt(c.amount)+'</td></tr>';}).join('')+'</tbody></table>':'<div class="empty">Nessuna capital call</div>')
    +'</div></div>';
}

async function veh(){
  var vs=await get('/vehicles/');
  var ct=document.getElementById('ct');
  ct.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:13px;color:#6b6a66">'+(vs||[]).length+' veicoli</div><button class="btn btn-primary" onclick="addVeh()">+ Nuovo veicolo</button></div>'
    +'<div class="card">'
    +(vs&&vs.length?'<table class="data-table"><thead><tr><th>Nome</th><th>Asset class</th><th>Manager</th><th>Valuta</th><th>Vintage</th><th>Commitment</th></tr></thead><tbody>'
    +vs.map(function(v){return'<tr><td style="font-weight:500">'+v.name+'</td><td>'+( v.asset_class||'—')+'</td><td>'+(v.manager||'—')+'</td><td>'+v.currency+'</td><td>'+(v.vintage_year||'—')+'</td><td>'+fmt(v.commitment)+'</td></tr>';}).join('')+'</tbody></table>'
    :'<div class="empty">Nessun veicolo. Clicca "Nuovo veicolo".</div>')
    +'</div><div id="vm"></div>';
}

function addVeh(){
  document.getElementById('vm').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)this.innerHTML=\'\'"><div class="modal"><div class="modal-title">Nuovo veicolo</div>'
    +'<div class="form-row"><label class="form-label">Nome *</label><input class="form-input" id="vn" type="text"/></div>'
    +'<div class="form-row"><label class="form-label">Asset class</label><select class="form-select" id="va"><option value="">—</option><option>Private Equity</option><option>Real Estate</option><option>Hedge Fund</option><option>Bond</option><option>Equity</option><option>Cash</option></select></div>'
    +'<div class="form-row"><label class="form-label">Manager</label><input class="form-input" id="vmg" type="text"/></div>'
    +'<div class="form-row"><label class="form-label">Valuta</label><select class="form-select" id="vc"><option>EUR</option><option>USD</option><option>GBP</option></select></div>'
    +'<div class="form-row"><label class="form-label">Vintage</label><input class="form-input" id="vv" type="number"/></div>'
    +'<div class="form-row"><label class="form-label">Commitment</label><input class="form-input" id="vco" type="number"/></div>'
    +'<div class="modal-footer"><button class="btn" onclick="document.getElementById(\'vm\').innerHTML=\'\'">Annulla</button><button class="btn btn-primary" onclick="saveVeh()">Salva</button></div>'
    +'</div></div>';
}

async function saveVeh(){
  var n=document.getElementById('vn').value;if(!n)return;
  await fetch('/api/vehicles/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,asset_class:document.getElementById('va').value||null,manager:document.getElementById('vmg').value||null,currency:document.getElementById('vc').value||'EUR',vintage_year:document.getElementById('vv').value?parseInt(document.getElementById('vv').value):null,commitment:document.getElementById('vco').value?parseFloat(document.getElementById('vco').value):null})});
  document.getElementById('vm').innerHTML='';veh();
}

async function docs(){
  var d=await get('/documents/');
  var vs=await get('/vehicles/');
  var ct=document.getElementById('ct');
  var vm={};if(vs)vs.forEach(function(v){vm[v.id]=v.name;});
  var sc={done:'background:#E1F5EE;color:#0F6E56',pending:'background:#FAEEDA;color:#854F0B',processing:'background:#FAEEDA;color:#854F0B',failed:'background:#FCEBEB;color:#A32D2D'};
  var fc={pdf:'background:#FAECE7;color:#993C1D',xlsx:'background:#EAF3DE;color:#3B6D11',xls:'background:#EAF3DE;color:#3B6D11',csv:'background:#EAF3DE;color:#3B6D11'};
  ct.innerHTML='<div class="bottom-row" style="margin-bottom:16px">'
    +'<div class="card"><div class="card-title">Carica documenti</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:10px">'
    +'<select class="form-select" id="uv" style="flex:1"><option value="">Veicolo (opz.)</option>'+(vs||[]).map(function(v){return'<option value="'+v.id+'">'+v.name+'</option>';}).join('')+'</select>'
    +'<select class="form-select" id="uc" style="flex:1"><option value="">Categoria (opz.)</option><option>nav_statement</option><option>capital_call</option><option>distribution</option><option>report</option><option>other</option></select>'
    +'</div>'
    +'<div class="upload-zone" onclick="document.getElementById(\'fi\').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handleUp(event.dataTransfer.files)">'
    +'<div style="font-size:22px;margin-bottom:8px">↑</div>'
    +'<div style="font-size:13px;font-weight:500;margin-bottom:4px" id="us">Trascina o clicca per caricare</div>'
    +'<div style="font-size:11px;color:#9e9d99">PDF, Excel, CSV — estrazione con Claude AI</div>'
    +'</div>'
    +'<input type="file" id="fi" multiple accept=".pdf,.xlsx,.xls,.csv,.jpg,.png" style="display:none" onchange="handleUp(this.files)"/>'
    +'<div style="margin-top:10px"><span class="tag">Capital Call</span><span class="tag">NAV Statement</span><span class="tag">Distribution</span></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Repository — '+(d||[]).length+' documenti</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'
    +[['Totali',(d||[]).length,'#1a1a18'],['Estratti',(d||[]).filter(function(x){return x.extraction_status==='done';}).length,'#1D9E75'],['Falliti',(d||[]).filter(function(x){return x.extraction_status==='failed';}).length,'#D85A30']].map(function(r){return'<div class="kpi-card" style="padding:10px 12px"><div class="kpi-label">'+r[0]+'</div><div style="font-size:18px;font-weight:600;color:'+r[2]+'">'+r[1]+'</div></div>';}).join('')
    +'</div></div></div>'
    +'<div class="card">'
    +(d&&d.length?'<table class="data-table"><thead><tr><th>File</th><th>Tipo</th><th>Categoria</th><th>Veicolo</th><th>Stato</th><th></th></tr></thead><tbody>'
    +d.map(function(x){return'<tr><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+x.original_filename+'">'+x.original_filename+'</td><td><span class="sbadge" style="'+(fc[x.file_type]||'background:#f1f0ed;color:#333')+'">'+(x.file_type||'').toUpperCase()+'</span></td><td>'+(x.doc_category?'<span class="tag">'+x.doc_category+'</span>':'—')+'</td><td>'+(vm[x.vehicle_id]||'—')+'</td><td><span class="sbadge" style="'+(sc[x.extraction_status]||'background:#f1f0ed;color:#333')+'">'+x.extraction_status+'</span></td><td><button style="background:none;border:none;cursor:pointer;color:#185FA5;font-size:11px" onclick="rex('+x.id+')">↻</button></td></tr>';}).join('')+'</tbody></table>'
    :'<div class="empty">Nessun documento. Carica il primo!</div>')
    +'</div>';
}

async function handleUp(files){
  if(!files||!files.length)return;
  var us=document.getElementById('us');if(us)us.textContent='Caricamento...';
  for(var i=0;i<files.length;i++){
    var fd=new FormData();fd.append('file',files[i]);
    var vid=document.getElementById('uv');if(vid&&vid.value)fd.append('vehicle_id',vid.value);
    var cat=document.getElementById('uc');if(cat&&cat.value)fd.append('doc_category',cat.value);
    fd.append('auto_extract','true');
    await fetch('/api/documents/upload',{method:'POST',body:fd});
  }
  if(us)us.textContent='Trascina o clicca per caricare';
  docs();
}

async function rex(id){await fetch('/api/documents/'+id+'/extract',{method:'POST'});docs();}

nav('dashboard',document.querySelector('.nav-item'));
</script>
</body>
</html>
